ARGOCD_PR_CREATOR_TOKEN   → PAT of bmogc-Koch SA       🔒 secret
ARGOCD_APPROVER_TOKEN     → PAT of dss-devops-argocd-approver  🔒 secret
ARGOCD_REPO_OWNER         → BMO-Prod                   (not secret)
ARGOCD_REPO_NAME          → your-argocd-repo-name      (not secret)

